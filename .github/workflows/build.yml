name: Build Python

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Python version
      verbose:
        type: boolean
        description: Verbose output
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build Python (${{ github.event.inputs.version }})
    runs-on: ubuntu-latest
    container: debian:13-slim

    outputs:
      release: ${{ fromJSON(steps.upload.outputs.assets)[0].browser_download_url }}

    steps:
      - name: Install build dependencies
        run: |
          apt-get update -y
          apt-get install -y git sudo wget curl clang llvm llvm-profdata llvm-bolt xz-utils libssl-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev libncurses-dev libxml2-dev libxmlsec1-dev libffi-dev liblzma-dev libzstd-dev libmpdec-dev libmariadb-dev build-essential

      - name: Install pyenv
        run: |
          git clone --depth=1 https://github.com/pyenv/pyenv.git /opt/pyenv
          /opt/pyenv/src/configure
          echo "/opt/pyenv/plugins/python-build/bin" >> $GITHUB_PATH
          echo "/opt/pyenv/bin" >> $GITHUB_PATH
          echo "PYENV_ROOT=/opt/pyenv" >> $GITHUB_ENV

      - name: Build Python with python-build
        run: |
          python-build ${{ inputs.verbose && '--verbose' || '' }} "${{ github.event.inputs.version }}" "/opt/pyenv/versions/${{ github.event.inputs.version }}-bin"
          tar -czf /tmp/python.tar.gz -C "/opt/pyenv/versions/${{ github.event.inputs.version }}-bin" .
        env:
          PYTHON_CONFIGURE_OPTS: --with-lto --with-computed-gotos --with-tail-call-interp --enable-optimizations --enable-bolt --enable-shared --enable-experimental-jit=yes-off
          CC: /usr/bin/clang
          CXX: /usr/bin/clang++

      - name: Upload built Python to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        id: upload
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: /tmp/python.tar.gz

  update:
    name: Update plugin (${{ github.event.inputs.version }})
    runs-on: ubuntu-latest

    needs:
      - build

    steps:
      - name: Configue Git details
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout plugin repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: plugin
          fetch-depth: 0

      - name: Update plugin files
        run: |
          mkdir -p share/python-build/ || true
          printf "install_package \".\" \"${{ needs.build.outputs.release }}\" \"copy\"\n" > "share/python-build/${{ github.event.inputs.version }}-bin"
          git add "share/python-build/${{ github.event.inputs.version }}-bin"
          git commit -m "Build ${{ github.event.inputs.version }}"

      - name: Push plugin files
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # v1.1.0
        with:
          branch: plugin
